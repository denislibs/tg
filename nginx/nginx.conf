worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile      on;
  tcp_nopush    on;
  server_tokens off;

  # --- Static compression (gzip; brotli would need a custom nginx build) ---
  gzip              on;
  gzip_comp_level   6;
  gzip_min_length   1024;
  gzip_proxied      any;
  gzip_vary         on;
  gzip_types
    text/plain text/css text/javascript
    application/javascript application/json application/xml
    application/wasm image/svg+xml font/woff font/woff2;

  # WebSocket upgrade plumbing
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # Rate-limit zone for auth endpoints (brute-force protection): 5 req/min per IP.
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

  # HTTP->HTTPS target: prod (standard ports) keeps $host (→ :443); local dev
  # stacks publish HTTPS on a non-standard port, so map their http host:port to
  # the matching https port. (nginx >=1.11 interpolates variables in map values.)
  map $http_host $https_redirect {
    default            https://$host$request_uri;
    "localhost:38080"  https://localhost:38443$request_uri;   # verify stack
    "localhost:8080"   https://localhost:8443$request_uri;    # main compose
  }

  upstream backend {
    server backend:8080;
  }

  # --- HTTP -> HTTPS redirect ---
  server {
    listen 80;
    return 301 $https_redirect;
  }

  # --- HTTPS (terminates TLS; proxies plain http/ws to backend over the
  #     internal docker network) ---
  server {
    listen 443 ssl;
    http2  on;

    ssl_certificate     /etc/nginx/certs/dev.pem;
    ssl_certificate_key /etc/nginx/certs/dev-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;

    root   /usr/share/nginx/html;   # the vite `dist` (bind-mounted from the host)
    index  index.html;

    client_max_body_size 100m;

    # --- Auth endpoints: rate-limited (longer prefix wins over /api/) ---
    location /api/auth/ {
      limit_req         zone=auth burst=5 nodelay;
      limit_req_status  429;
      proxy_pass         http://backend/auth/;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # --- REST API -> backend (strip the /api/ prefix; backend serves at root) ---
    location /api/ {
      proxy_pass         http://backend/;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # --- WebSocket -> backend (long-lived; wss terminates here) ---
    location /ws {
      proxy_pass         http://backend/ws;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection $connection_upgrade;
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    # --- Hashed build assets: cache aggressively (filenames are content-hashed) ---
    location /assets/ {
      try_files $uri =404;
      access_log off;
      expires    1y;
      add_header Cache-Control "public, immutable";
    }

    # --- Публичная страница-превью @username (аналог t.me) -> backend ---
    location ~ ^/@ {
      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # --- SPA: serve files, fall back to index.html for client-side routes ---
    location / {
      try_files $uri $uri/ /index.html;
    }

    # index.html must never be cached (it references the latest hashed assets)
    location = /index.html {
      add_header Cache-Control "no-cache";
    }
  }
}
