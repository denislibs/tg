worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile      on;
  tcp_nopush    on;
  server_tokens off;

  # --- Static compression (gzip; brotli would need a custom nginx build) ---
  gzip              on;
  gzip_comp_level   6;
  gzip_min_length   1024;
  gzip_proxied      any;
  gzip_vary         on;
  gzip_types
    text/plain text/css text/javascript
    application/javascript application/json application/xml
    application/wasm image/svg+xml font/woff font/woff2;

  # WebSocket upgrade plumbing
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream backend {
    server backend:8080;
  }

  server {
    listen 80;
    root   /usr/share/nginx/html;   # the vite `dist` (bind-mounted from the host)
    index  index.html;

    client_max_body_size 100m;

    # --- REST API -> backend (strip the /api/ prefix; backend serves at root) ---
    location /api/ {
      proxy_pass         http://backend/;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # --- WebSocket -> backend (long-lived) ---
    location /ws {
      proxy_pass         http://backend/ws;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection $connection_upgrade;
      proxy_set_header   Host       $host;
      proxy_set_header   X-Real-IP  $remote_addr;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    # --- Hashed build assets: cache aggressively (filenames are content-hashed) ---
    location /assets/ {
      try_files $uri =404;
      access_log off;
      expires    1y;
      add_header Cache-Control "public, immutable";
    }

    # --- SPA: serve files, fall back to index.html for client-side routes ---
    location / {
      try_files $uri $uri/ /index.html;
    }

    # index.html must never be cached (it references the latest hashed assets)
    location = /index.html {
      add_header Cache-Control "no-cache";
    }
  }
}
