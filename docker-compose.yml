services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: messenger
      POSTGRES_PASSWORD: messenger
      POSTGRES_DB: messenger
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U messenger"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10


  # Перевод сообщений — self-hosted LibreTranslate. Backend ходит на него по
  # http://libretranslate:5000 (TRANSLATE_URL). LT_LOAD_ONLY ограничивает набор
  # моделей (быстрее старт). Порт наружу не публикуем (обращается только backend).
  libretranslate:
    image: libretranslate/libretranslate:latest
    environment:
      LT_LOAD_ONLY: "en,ru,es,de,fr,it,uk"
      LT_UPDATE_MODELS: "false"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/languages')\""]
      interval: 10s
      timeout: 5s
      retries: 30
    volumes: ["ltmodels:/home/libretranslate/.local"]

  # TURN-релей для звонков через интернет (за NAT). Клиенты получают адрес и
  # эфемерные креды через GET /calls/ice (схема coturn use-auth-secret).
  # TURN_HOST у backend должен указывать на адрес, ДОСТУПНЫЙ клиентам
  # (в проде — публичный IP/домен этой машины).
  coturn:
    image: coturn/coturn:4.6-alpine
    restart: unless-stopped
    command: >
      -n --log-file=stdout
      --listening-port=3478
      --fingerprint
      --use-auth-secret
      --static-auth-secret=${TURN_SECRET:-dev-turn-secret-change-me}
      --realm=messenger
      --min-port=49160 --max-port=49200
      --no-cli
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "49160-49200:49160-49200/udp"

  backend:
    build: ./backend
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: "postgres://messenger:messenger@postgres:5432/messenger?sslmode=disable"
      REDIS_URL: "redis://redis:6379"
      # TURN для звонков: хост, достижимый клиентами (в проде — публичный IP)
      TURN_HOST: "${TURN_HOST:-localhost}"
      TURN_SECRET: "${TURN_SECRET:-dev-turn-secret-change-me}"
      DEV_OTP_CODE: "12345"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"
      MINIO_BUCKET: "media"
      # Перевод сообщений через self-hosted LibreTranslate.
      TRANSLATE_URL: "http://libretranslate:5000"
      # Web Push: set real VAPID keys to enable push (npx web-push generate-vapid-keys)
      # VAPID_PUBLIC_KEY: ""
      # VAPID_PRIVATE_KEY: ""
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }

  messenger_elixir:
    build: ./messenger_elixir
    ports: ["4000:4000"]
    environment:
      DATABASE_URL: "postgres://messenger:messenger@postgres:5432/messenger"
      REDIS_URL: "redis://redis:6379"
      SECRET_KEY_BASE: "dVBt0hNlwsRCLXbcIJmb7dVBt0hNlwsRCLXbcIJmb7dVBt0hNlwsRCLXbcIJmb7dVBt"
      PHX_HOST: "localhost"
      DEV_OTP_CODE: "12345"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      # Vite build output (run `npm run dev` (watch) or a one-off build in telegram-ui-clone first).
      - ./client-build:/usr/share/nginx/html:ro
    ports: ["8080:80", "8443:443"]
    depends_on: [backend]

volumes:
  pgdata:
  miniodata:
  ltmodels:
