openapi: 3.0.3
info:
  title: Messenger API
  version: "0.1.0 (Phase 0)"
  description: |
    REST + WebSocket API for the messenger backend (Phase 0).
    Realtime delivery uses WebSocket (`/ws`); see `docs/contracts.md` for the WS frame protocol.
servers:
  - url: /
    description: Same-origin (behind nginx, the API is mounted under /api/)
tags:
  - name: auth
  - name: sessions
  - name: chats
  - name: groups
  - name: channels
  - name: search
  - name: messages
  - name: reactions
  - name: sync
  - name: media
  - name: push
  - name: stories
  - name: system

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Opaque device session token returned by /auth/sign_in.
  schemas:
    Error:
      type: object
      properties: { error: { type: string } }
    OK:
      type: object
      properties: { ok: { type: boolean, example: true } }
    User:
      type: object
      properties:
        id: { type: integer, format: int64 }
        phone: { type: string }
        display_name: { type: string }
    Message:
      type: object
      properties:
        id: { type: integer, format: int64 }
        chat_id: { type: integer, format: int64 }
        seq: { type: integer, format: int64, description: monotonic per-chat sequence }
        sender_id: { type: integer, format: int64 }
        type: { type: string, example: text, description: "text | photo | video | voice | document | …" }
        text: { type: string }
        reply_to_id: { type: integer, format: int64, nullable: true }
        media_id: { type: integer, format: int64, nullable: true }
        thread_root_id: { type: integer, format: int64, nullable: true, description: "channel post id this comment threads under; null for normal messages" }
        created_at: { type: string, format: date-time }
        deleted: { type: boolean }
        reactions:
          type: array
          description: aggregated reactions for the viewer (omitted when none)
          items: { $ref: "#/components/schemas/ReactionCount" }
    Dialog:
      type: object
      properties:
        chat_id: { type: integer, format: int64 }
        type: { type: string, example: private }
        last_read_seq: { type: integer, format: int64 }
        unread: { type: integer }
        muted: { type: boolean }
        peer:
          nullable: true
          description: the other participant of a private chat; null for non-private chats
          type: object
          properties:
            id: { type: integer, format: int64 }
            display_name: { type: string }
            avatar_url: { type: string }
        last_message:
          nullable: true
          type: object
          properties:
            seq: { type: integer, format: int64 }
            text: { type: string }
            sender_id: { type: integer, format: int64 }
            at: { type: string, format: date-time }
    Difference:
      type: object
      description: getDifference-style result; client tracks state.pts as its cursor.
      properties:
        new_messages:
          type: array
          items: { type: object, description: new_message update payload }
        other_updates:
          type: array
          items: { type: object, description: "read / reaction / edit / delete update payloads" }
        state:
          type: object
          properties:
            pts: { type: integer, format: int64 }
            date: { type: integer, format: int64, description: server time (ms) }
        slice: { type: boolean, description: more updates remain; call /sync again }
        too_long: { type: boolean, description: too far behind; do a full resync }
    ReactionCount:
      type: object
      properties:
        emoji: { type: string }
        count: { type: integer }
        mine: { type: boolean, description: the viewer reacted with this emoji (omitted when false) }
    Session:
      type: object
      properties:
        id: { type: integer, format: int64, description: device id }
        name: { type: string }
        platform: { type: string, example: ios }
        last_active: { type: string, format: date-time }
        current: { type: boolean }
    ChatCard:
      type: object
      description: Group/channel info screen, including the caller's own role/rights/mute.
      properties:
        id: { type: integer, format: int64 }
        type: { type: string, example: group }
        title: { type: string }
        username: { type: string }
        about: { type: string }
        photo_media_id: { type: integer, format: int64, nullable: true }
        creator_id: { type: integer, format: int64 }
        member_count: { type: integer, description: "denormalized; maintained on add/remove" }
        is_public: { type: boolean }
        my_role: { type: string, description: "creator | admin | member; empty if the caller is not a member", example: creator }
        my_rights: { type: integer, description: "admin rights bitmask of the caller (0 if member/non-member)" }
        muted: { type: boolean }
    UserCard:
      type: object
      description: Minimal public user record (batch lookups, sender names).
      properties:
        id: { type: integer, format: int64 }
        username: { type: string }
        display_name: { type: string }
        avatar_url: { type: string }
    InviteLink:
      type: object
      properties:
        token: { type: string, description: random hex token }
        uses: { type: integer }
        url: { type: string, example: /join/abc123, description: relative join URL }
        requires_approval: { type: boolean, description: if true, joins create a pending request instead of adding the member }
    ChannelUpdate:
      type: object
      description: A single channel post (new_message payload) from the channel_updates log.
      properties:
        chat_id: { type: integer, format: int64 }
        msg_id: { type: integer, format: int64 }
        seq: { type: integer, format: int64, description: monotonic per-chat sequence }
        sender_id: { type: integer, format: int64 }
        type: { type: string, example: text }
        text: { type: string }
        media_id: { type: integer, format: int64, nullable: true }
        created_at: { type: string, format: date-time }
    ChannelDifference:
      type: object
      description: |
        Per-channel getDifference catch-up. Uses the channel's own pts cursor,
        independent of the per-user /sync pts.
      properties:
        updates:
          type: array
          items: { $ref: "#/components/schemas/ChannelUpdate" }
        pts: { type: integer, format: int64, description: highest channel pts in this batch (new cursor) }
        slice: { type: boolean, description: batch hit the page cap (100); call again with the new pts }
    SearchResult:
      type: object
      description: Global directory search results (public chats + users); private chats never returned.
      properties:
        chats:
          type: array
          items:
            type: object
            properties:
              id: { type: integer, format: int64 }
              type: { type: string, example: channel }
              title: { type: string }
              username: { type: string }
              member_count: { type: integer }
        users:
          type: array
          items: { $ref: "#/components/schemas/UserCard" }

paths:
  /health:
    get:
      tags: [system]
      summary: Liveness probe
      security: []
      responses:
        "200":
          description: OK
          content: { application/json: { schema: { type: object, properties: { status: { type: string, example: ok } } } } }

  /auth/request_code:
    post:
      tags: [auth]
      summary: Request a login code (dev OTP is logged server-side)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone]
              properties: { phone: { type: string, example: "+79990000000" } }
      responses:
        "200": { description: code issued, content: { application/json: { schema: { $ref: "#/components/schemas/OK" } } } }
        "400": { description: phone required, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /auth/sign_in:
    post:
      tags: [auth]
      summary: Verify the code, create the user+device, return a session token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, code]
              properties:
                phone: { type: string, example: "+79990000000" }
                code: { type: string, example: "12345" }
                device: { type: string, example: web }
                platform: { type: string, example: browser }
      responses:
        "200":
          description: signed in
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  user: { $ref: "#/components/schemas/User" }
        "401": { description: invalid code, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /auth/qr/new:
    post:
      tags: [auth]
      summary: Start a QR login (ephemeral pending record + scan URL)
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties: { platform: { type: string, example: web } }
      responses:
        "200":
          description: pending QR login created
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  url: { type: string, example: "https://app.example/qr/<token>" }
                  expires_at: { type: string, format: date-time }
        "503": { description: qr login unavailable, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /auth/qr/{token}:
    get:
      tags: [auth]
      summary: Poll a QR login (confirmed records are single-use)
      security: []
      parameters:
        - { name: token, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: status (pending | confirmed | expired)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [pending, confirmed, expired] }
                  session_token: { type: string }
                  user: { $ref: "#/components/schemas/User" }
        "503": { description: qr login unavailable, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /auth/qr/confirm:
    post:
      tags: [auth]
      summary: Confirm a pending QR login (mints a session for the caller)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties: { token: { type: string } }
      responses:
        "200": { description: confirmed, content: { application/json: { schema: { $ref: "#/components/schemas/OK" } } } }
        "400": { description: token required, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "404": { description: invalid or expired token, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "503": { description: qr login unavailable, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /auth/logout:
    post:
      tags: [sessions]
      summary: Revoke the current session (and close its live socket)
      responses:
        "200": { description: logged out, content: { application/json: { schema: { $ref: "#/components/schemas/OK" } } } }

  /me:
    get:
      tags: [auth]
      summary: Current user
      responses:
        "200": { description: the authenticated user, content: { application/json: { schema: { $ref: "#/components/schemas/User" } } } }
        "401": { description: missing/invalid token, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /sessions:
    get:
      tags: [sessions]
      summary: List the user's devices/sessions
      responses:
        "200":
          description: sessions
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessions: { type: array, items: { $ref: "#/components/schemas/Session" } }
  /sessions/{deviceID}:
    delete:
      tags: [sessions]
      summary: Revoke a specific session (closes its live socket)
      parameters:
        - { name: deviceID, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200": { description: revoked, content: { application/json: { schema: { $ref: "#/components/schemas/OK" } } } }
        "404": { description: session not found, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /chats:
    post:
      tags: [chats]
      summary: Create (or get existing) a private chat with another user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties: { user_id: { type: integer, format: int64 } }
      responses:
        "200": { description: chat id, content: { application/json: { schema: { type: object, properties: { chat_id: { type: integer, format: int64 } } } } } }
    get:
      tags: [chats]
      summary: List the user's chats (dialogs), newest activity first
      responses:
        "200":
          description: dialogs
          content:
            application/json:
              schema:
                type: object
                properties:
                  chats: { type: array, items: { $ref: "#/components/schemas/Dialog" } }

  /groups:
    post:
      tags: [groups]
      summary: Create a group (caller becomes creator + first member)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string, example: Team }
                about: { type: string }
                username: { type: string, description: only meaningful when is_public }
                is_public: { type: boolean }
      responses:
        "200": { description: chat id, content: { application/json: { schema: { type: object, properties: { chat_id: { type: integer, format: int64 } } } } } }
        "400": { description: title required, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /chats/{chatID}/card:
    get:
      tags: [groups]
      summary: Group/channel info card (with the caller's own role/rights/mute)
      parameters:
        - { name: chatID, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200": { description: chat card, content: { application/json: { schema: { $ref: "#/components/schemas/ChatCard" } } } }
        "404": { description: no such chat, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /chats/{chatID}:
    patch:
      tags: [groups]
      summary: Edit group info (needs CHANGE_INFO right)
      parameters:
        - { name: chatID, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                about: { type: string }
                username: { type: string }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/OK" } } } }
        "403": { description: forbidden, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /chats/{chatID}/members:
    get:
      tags: [groups]
      summary: List chat members with role and online status (caller must be a member)
      parameters:
        - { name: chatID, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: offset, in: query, required: false, schema: { type: integer, default: 0 } }
        - { name: limit, in: query, required: false, schema: { type: integer, default: 200, maximum: 200 } }
      responses:
        "200":
          description: member list
          content:
            application/json:
              schema:
                type: object
                properties:
                  members:
                    type: array
                    items:
                      type: object
                      properties:
                        user_id: { type: integer, format: int64 }
                        role: { type: string, enum: [creator, admin, member] }
                        online: { type: boolean, description: "realtime presence; always false when presence is disabled" }
        "403": { description: caller is not a member, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    post:
      tags: [groups]
      summary: Add a user as a plain member (needs INVITE_USERS right)
      parameters:
        - { name: chatID, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties: { user_id: { type: integer, format: int64 } }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/OK" } } } }
        "400": { description: user_id required, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "403": { description: forbidden, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /chats/{chatID}/members/{userID}:
    delete:
      tags: [groups]
      summary: Remove a member (kick needs BAN_USERS; self-leave always allowed)
      parameters:
        - { name: chatID, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: userID, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/OK" } } } }
        "403": { description: forbidden, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /chats/{chatID}/admins:
    post:
      tags: [groups]
      summary: Promote a member to admin with a rights bitmask (needs MANAGE_ADMINS)
      parameters:
        - { name: chatID, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id: { type: integer, format: int64 }
                rights: { type: integer, description: "rights bitmask (POST=1,EDIT=2,DELETE=4,BAN=8,INVITE=16,PIN=32,CHANGE_INFO=64,MANAGE_ADMINS=128)" }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/OK" } } } }
        "400": { description: user_id required, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "403": { description: forbidden, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /chats/{chatID}/admins/{userID}:
    delete:
      tags: [groups]
      summary: Demote an admin back to member (needs MANAGE_ADMINS)
      parameters:
        - { name: chatID, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: userID, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/OK" } } } }
        "403": { description: forbidden, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /chats/{chatID}/mute:
    post:
      tags: [groups]
      summary: Set the caller's own per-chat mute flag
      parameters:
        - { name: chatID, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [muted]
              properties: { muted: { type: boolean } }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/OK" } } } }

  /chats/{chatID}/polls:
    post:
      tags: [messages]
      summary: Send a poll (message of type 'poll')
      parameters:
        - { name: chatID, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [question, options]
              properties:
                question: { type: string, maxLength: 255 }
                options: { type: array, items: { type: string, maxLength: 100 }, minItems: 2, maxItems: 10 }
                anonymous: { type: boolean, default: true }
                multiple: { type: boolean, default: false }
                quiz: { type: boolean, default: false, description: forces single-choice; requires correct_option }
                correct_option: { type: integer, nullable: true }
                client_msg_id: { type: string }
      responses:
        "200": { description: the created message (includes poll view), content: { application/json: { schema: { $ref: "#/components/schemas/Message" } } } }
        "400": { description: invalid poll, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /chats/{chatID}/scheduled:
    post:
      tags: [messages]
      summary: Schedule a message (dispatched into history at send_at by a worker)
      parameters:
        - { name: chatID, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [send_at]
              properties:
                type: { type: string, default: text }
                text: { type: string }
                entities: { type: array, items: { type: object }, nullable: true, description: rich-text entities (см. contracts.md) }
                reply_to_id: { type: integer, format: int64, nullable: true }
                media_id: { type: integer, format: int64, nullable: true }
                send_at: { type: integer, format: int64, description: unix seconds, must be in the future }
      responses:
        "200": { description: the scheduled entry, content: { application/json: { schema: { type: object } } } }
        "400": { description: invalid (empty/past/limit), content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    get:
      tags: [messages]
      summary: The caller's own scheduled messages in the chat (soonest first)
      parameters:
        - { name: chatID, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200": { description: scheduled entries, content: { application/json: { schema: { type: object } } } }

  /chats/{chatID}/scheduled/{schedID}:
    delete:
      tags: [messages]
      summary: Remove own scheduled message
      parameters:
        - { name: chatID, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: schedID, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/OK" } } } }
        "403": { description: not the author, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /chats/{chatID}/scheduled/{schedID}/send_now:
    post:
      tags: [messages]
      summary: Send own scheduled message immediately
      parameters:
        - { name: chatID, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: schedID, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200": { description: the created message, content: { application/json: { schema: { $ref: "#/components/schemas/Message" } } } }

  /polls/{pollID}/vote:
    post:
      tags: [messages]
      summary: Replace the caller's vote (empty options = retract; quiz answers are final)
      parameters:
        - { name: pollID, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [options]
              properties:
                options: { type: array, items: { type: integer } }
      responses:
        "200": { description: "viewer's updated poll view", content: { application/json: { schema: { type: object } } } }
        "400": { description: invalid vote (closed / bad indexes / quiz re-vote), content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /polls/{pollID}/close:
    post:
      tags: [messages]
      summary: Stop the poll (poll author or chat admin)
      parameters:
        - { name: pollID, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/OK" } } } }
        "403": { description: not allowed, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /chats/{chatID}/pin:
    post:
      tags: [groups]
      summary: Pin/unpin the dialog at the top of the chat list (per-user, max 5)
      parameters:
        - { name: chatID, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pinned]
              properties: { pinned: { type: boolean } }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/OK" } } } }
        "400": { description: pin limit reached, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /chats/{chatID}/archive:
    post:
      tags: [groups]
      summary: Move the dialog to/from the archive (per-user; clears its pin)
      parameters:
        - { name: chatID, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [archived]
              properties: { archived: { type: boolean } }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/OK" } } } }

  /chats/{chatID}/invite_links:
    post:
      tags: [groups]
      summary: Create an invite link (needs INVITE_USERS right)
      parameters:
        - { name: chatID, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                usage_limit: { type: integer, nullable: true, description: null = unlimited }
                requires_approval: { type: boolean, description: "if true, joins via this link require admin approval (default false)" }
      responses:
        "200": { description: created link, content: { application/json: { schema: { type: object, properties: { token: { type: string }, url: { type: string }, requires_approval: { type: boolean } } } } } }
        "403": { description: forbidden, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    get:
      tags: [groups]
      summary: List active (non-revoked) invite links (needs INVITE_USERS right)
      parameters:
        - { name: chatID, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: invite links
          content:
            application/json:
              schema:
                type: object
                properties:
                  invite_links: { type: array, items: { $ref: "#/components/schemas/InviteLink" } }
        "403": { description: forbidden, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /join/{token}:
    post:
      tags: [groups]
      summary: Join a chat via an invite token (member immediately, or pending request if the link requires approval)
      parameters:
        - { name: token, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: "joined or requested", content: { application/json: { schema: { type: object, properties: { status: { type: string, enum: [joined, requested] } } } } } }
        "404": { description: unknown or revoked token, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /chats/{chatID}/join_requests:
    get:
      tags: [groups]
      summary: List pending join requests (needs INVITE_USERS right)
      parameters:
        - { name: chatID, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: pending join requests
          content:
            application/json:
              schema:
                type: object
                properties:
                  requests: { type: array, items: { type: object, properties: { user_id: { type: integer, format: int64 } } } }
        "403": { description: forbidden, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /chats/{chatID}/join_requests/{userID}/approve:
    post:
      tags: [groups]
      summary: Approve a pending join request (needs INVITE_USERS right)
      parameters:
        - { name: chatID, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: userID, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/OK" } } } }
        "403": { description: forbidden, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "404": { description: not found, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /chats/{chatID}/join_requests/{userID}/decline:
    post:
      tags: [groups]
      summary: Decline (remove) a pending join request (needs INVITE_USERS right)
      parameters:
        - { name: chatID, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: userID, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/OK" } } } }
        "403": { description: forbidden, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "404": { description: not found, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /users:
    get:
      tags: [groups]
      summary: Batch-resolve minimal public user cards
      parameters:
        - { name: ids, in: query, schema: { type: string }, description: "comma-separated int64 ids, e.g. 1,2,3 (unknown ids skipped)" }
      responses:
        "200":
          description: user cards
          content:
            application/json:
              schema:
                type: object
                properties:
                  users: { type: array, items: { $ref: "#/components/schemas/UserCard" } }

  /channels:
    post:
      tags: [channels]
      summary: Create a channel (caller becomes creator + first member)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string, example: News }
                about: { type: string }
                username: { type: string, description: only meaningful when is_public }
                is_public: { type: boolean }
      responses:
        "200": { description: chat id, content: { application/json: { schema: { type: object, properties: { chat_id: { type: integer, format: int64 } } } } } }
        "400": { description: title required, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /channels/{chatID}/messages:
    post:
      tags: [channels]
      summary: Post to a channel (needs POST_MESSAGES); O(1) delivery, one PUBLISH channel:{id}
      description: |
        Inserts the message, bumps the channel's channel_pts, appends a
        channel_updates row, then publishes once to the Redis topic channel:{chatID}.
        No per-subscriber fan-out and no per-subscriber pts rows.
      parameters:
        - { name: chatID, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                text: { type: string }
                client_msg_id: { type: string, description: client UUID for idempotency }
      responses:
        "200":
          description: the created post
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer, format: int64 }
                  chat_id: { type: integer, format: int64 }
                  seq: { type: integer, format: int64 }
                  created_at: { type: string, format: date-time }
        "403": { description: caller lacks POST_MESSAGES, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /channels/{chatID}/difference:
    get:
      tags: [channels]
      summary: Per-channel getDifference catch-up (channel's own pts cursor)
      parameters:
        - { name: chatID, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: pts, in: query, schema: { type: integer, format: int64, default: 0 }, description: last seen channel pts }
      responses:
        "200": { description: channel updates since pts, content: { application/json: { schema: { $ref: "#/components/schemas/ChannelDifference" } } } }
        "403": { description: not a member/subscriber, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /channels/join:
    post:
      tags: [channels]
      summary: Join a public channel by @username (caller becomes a subscriber)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username]
              properties:
                username: { type: string, example: news }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/OK" } } } }
        "400": { description: username required, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "404": { description: no public chat with that username, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /channels/{chatID}/discussion:
    post:
      tags: [channels]
      summary: Enable discussions on a channel (needs CHANGE_INFO); idempotent
      description: |
        Auto-creates a backing group chat and links it via the channel's
        discussion_chat_id. Idempotent: returns the existing discussion group id
        if discussions are already enabled.
      parameters:
        - { name: chatID, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: the linked discussion group id
          content:
            application/json:
              schema:
                type: object
                properties:
                  discussion_chat_id: { type: integer, format: int64 }
        "403": { description: caller lacks CHANGE_INFO, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "404": { description: channel not found, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /channels/{chatID}/posts/{postId}/comments:
    post:
      tags: [channels]
      summary: Post a comment on a channel post (auto-joins the discussion group)
      description: |
        The comment is a message in the linked discussion group stamped with
        thread_root_id = postId. The caller auto-joins the discussion group.
      parameters:
        - { name: chatID, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: postId, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                text: { type: string }
                client_msg_id: { type: string, description: client UUID for idempotency }
      responses:
        "200": { description: the created comment, content: { application/json: { schema: { $ref: "#/components/schemas/Message" } } } }
        "404": { description: discussions not enabled, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    get:
      tags: [channels]
      summary: List the comment thread for a channel post (ascending by seq)
      parameters:
        - { name: chatID, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: postId, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: offset, in: query, schema: { type: integer, default: 0 } }
        - { name: limit, in: query, schema: { type: integer, default: 50, maximum: 100 } }
      responses:
        "200":
          description: the comment thread and total count
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages: { type: array, items: { $ref: "#/components/schemas/Message" } }
                  count: { type: integer }
        "404": { description: discussions not enabled, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /channels/{chatID}/comment_counts:
    get:
      tags: [channels]
      summary: Batch comment counts for channel posts
      parameters:
        - { name: chatID, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: ids, in: query, schema: { type: string }, description: "CSV of post message ids, e.g. 55,56,57" }
      responses:
        "200":
          description: post id (string key) -> comment count; empty object when discussions are off
          content:
            application/json:
              schema:
                type: object
                properties:
                  counts:
                    type: object
                    additionalProperties: { type: integer }

  /search:
    get:
      tags: [search]
      summary: Global directory search (public chats by username/title + users)
      parameters:
        - { name: q, in: query, schema: { type: string }, description: "search prefix; empty q yields empty results" }
      responses:
        "200": { description: matching public chats and users, content: { application/json: { schema: { $ref: "#/components/schemas/SearchResult" } } } }

  /search/messages:
    get:
      tags: [search]
      summary: Global message search across every chat the caller is a member of
      parameters:
        - { name: q, in: query, schema: { type: string }, description: "substring matched against text/file name; optional when filter set" }
        - { name: filter, in: query, schema: { type: string, enum: ["", media, links, files, music, voice] }, description: "shared-media kind; empty = any type" }
        - { name: offset, in: query, schema: { type: integer, default: 0 } }
        - { name: limit, in: query, schema: { type: integer, default: 20, maximum: 50 } }
      responses:
        "200":
          description: matching messages (newest first) + total count
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items: { $ref: "#/components/schemas/Message" }
                  count: { type: integer }

  /chats/{chatID}/messages:
    post:
      tags: [messages]
      summary: Send a message (also delivered live over WS to members)
      parameters:
        - { name: chatID, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type: { type: string, example: text }
                text: { type: string }
                reply_to_id: { type: integer, format: int64, nullable: true }
                client_msg_id: { type: string, description: client UUID for idempotency }
                media_id: { type: integer, format: int64, nullable: true, description: must be owned by the sender }
      responses:
        "200": { description: the created (or deduplicated) message, content: { application/json: { schema: { $ref: "#/components/schemas/Message" } } } }
        "403": { description: not a member / media not owned, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /chats/{chatID}/history:
    get:
      tags: [messages]
      summary: Paginated message window (offset_id/add_offset/limit), like getHistory
      parameters:
        - { name: chatID, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: offset_id, in: query, schema: { type: integer, format: int64, default: 0 }, description: "reference seq; 0 = newest" }
        - { name: add_offset, in: query, schema: { type: integer, default: 0 }, description: ">0 older, <=0 newer than offset_id" }
        - { name: limit, in: query, schema: { type: integer, default: 40 } }
      responses:
        "200":
          description: a window plus total count
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages: { type: array, items: { $ref: "#/components/schemas/Message" } }
                  count: { type: integer }
        "403": { description: not a member, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /chats/{chatID}/read:
    post:
      tags: [messages]
      summary: Mark read up to a sequence (fans out a read receipt)
      parameters:
        - { name: chatID, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [up_to_seq]
              properties: { up_to_seq: { type: integer, format: int64 } }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/OK" } } } }
        "403": { description: not a member, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /chats/{chatID}/messages/{msgID}/reactions:
    post:
      tags: [reactions]
      summary: Add an emoji reaction
      parameters:
        - { name: chatID, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: msgID, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [emoji]
              properties: { emoji: { type: string, example: "🔥" } }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/OK" } } } }
        "400": { description: invalid emoji, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "404": { description: message not found / no access, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    get:
      tags: [reactions]
      summary: Aggregated reaction counts for a message
      parameters:
        - { name: chatID, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: msgID, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  reactions: { type: array, items: { $ref: "#/components/schemas/ReactionCount" } }
        "404": { description: message not found, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
  /chats/{chatID}/messages/{msgID}/reactions/{emoji}:
    delete:
      tags: [reactions]
      summary: Remove a reaction (emoji is URL-escaped)
      parameters:
        - { name: chatID, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: msgID, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: emoji, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/OK" } } } }
        "400": { description: invalid emoji, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "404": { description: message not found, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /sync:
    get:
      tags: [sync]
      summary: Catch up on missed updates since a pts cursor (getDifference)
      parameters:
        - { name: pts, in: query, schema: { type: integer, format: int64, default: 0 } }
        - { name: date, in: query, schema: { type: integer, format: int64, default: 0 } }
      responses:
        "200": { description: difference, content: { application/json: { schema: { $ref: "#/components/schemas/Difference" } } } }

  /media/upload:
    post:
      tags: [media]
      summary: Register media metadata and get a presigned PUT URL (upload bytes directly to storage)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mime, size]
              properties:
                mime: { type: string, example: image/jpeg }
                size: { type: integer, format: int64, description: bytes; 1..104857600 }
                width: { type: integer }
                height: { type: integer }
                duration: { type: integer, description: seconds (audio/video) }
                blur_preview: { type: string, format: byte, description: base64 LQIP placeholder }
      responses:
        "200":
          description: media row + presigned upload URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  media_id: { type: integer, format: int64 }
                  object_key: { type: string }
                  upload_url: { type: string, description: presigned PUT (expires ~15m) }
        "400": { description: invalid size, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "413": { description: file too large, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
  /media/{mediaID}:
    get:
      tags: [media]
      summary: Resolve media to metadata + a presigned GET URL (owner or chat member only)
      parameters:
        - { name: mediaID, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: media metadata + download URL (Range-capable)
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer, format: int64 }
                  mime: { type: string }
                  size: { type: integer, format: int64 }
                  width: { type: integer }
                  height: { type: integer }
                  duration: { type: integer }
                  blur_preview: { type: string, format: byte, nullable: true }
                  download_url: { type: string, description: presigned GET (expires ~15m) }
        "404": { description: not found / no access, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
  /media/{mediaID}/content:
    put:
      tags: [media]
      summary: Stream raw media bytes through the backend into storage (owner only)
      description: >
        Bearer auth. The request body is the raw object bytes (not JSON);
        Content-Type should be the media's mime. Only the owner may upload.
        Body capped at 100 MiB.
      parameters:
        - { name: mediaID, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema: { type: string, format: binary }
      responses:
        "204": { description: uploaded }
        "403": { description: not the owner, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "404": { description: media not found, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    get:
      tags: [media]
      summary: Stream media bytes (Range-capable); authenticates via ?token= query, not Bearer
      description: >
        Streams the object bytes through the backend via http.ServeContent, so
        HTTP Range requests yield 206 Partial Content. Browser <img>/<video>
        elements can't set an Authorization header, so this endpoint authenticates
        via the `token` query parameter (the same mechanism as /ws) and is mounted
        OUTSIDE the Bearer group. Access is checked like GET /media/{mediaID}
        (owner or shares a chat referencing the media).
      security: []
      parameters:
        - { name: mediaID, in: path, required: true, schema: { type: integer, format: int64 } }
        - name: token
          in: query
          required: true
          description: session token (query param, not a Bearer header)
          schema: { type: string }
      responses:
        "200":
          description: full object bytes
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        "206": { description: partial content (Range request) }
        "401": { description: missing/invalid token, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "404": { description: not found / no access, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /push/vapid_public_key:
    get:
      tags: [push]
      summary: VAPID public key for the browser to subscribe with
      responses:
        "200":
          description: key
          content:
            application/json:
              schema: { type: object, properties: { public_key: { type: string } } }
  /push/subscribe:
    post:
      tags: [push]
      summary: Register the current device's Web Push subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [endpoint, p256dh, auth]
              properties:
                endpoint: { type: string }
                p256dh: { type: string }
                auth: { type: string }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/OK" } } } }
        "400": { description: missing fields, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /stories:
    post:
      tags: [stories]
      summary: Post a 24h story from a media object the caller owns
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [media_id]
              properties:
                media_id: { type: integer, format: int64 }
                caption: { type: string }
                privacy: { type: string, enum: [everyone, contacts, selected], default: contacts }
                allow_user_ids:
                  type: array
                  items: { type: integer, format: int64 }
                  description: explicit allow-list, used only when privacy=selected
      responses:
        "200":
          description: created
          content:
            application/json:
              schema: { type: object, properties: { id: { type: integer, format: int64 } } }
        "400": { description: missing media_id, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "403": { description: media not owned by caller, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    get:
      tags: [stories]
      summary: The viewer's active story feed (own group first), grouped by author
      responses:
        "200":
          description: active story groups
          content:
            application/json:
              schema:
                type: object
                properties:
                  groups:
                    type: array
                    items:
                      type: object
                      properties:
                        author:
                          type: object
                          properties:
                            id: { type: integer, format: int64 }
                            display_name: { type: string }
                            avatar_url: { type: string }
                        stories:
                          type: array
                          items:
                            type: object
                            properties:
                              id: { type: integer, format: int64 }
                              media_id: { type: integer, format: int64 }
                              caption: { type: string }
                              created_at: { type: string, format: date-time }
                              viewed: { type: boolean }
  /stories/{storyID}/view:
    post:
      tags: [stories]
      summary: Mark a story as seen (idempotent)
      parameters:
        - { name: storyID, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/OK" } } } }
        "403": { description: story not visible to caller, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
  /stories/{storyID}/viewers:
    get:
      tags: [stories]
      summary: Who has seen the story (author only)
      parameters:
        - { name: storyID, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: viewers list
          content:
            application/json:
              schema:
                type: object
                properties:
                  viewers:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer, format: int64 }
                        display_name: { type: string }
                        avatar_url: { type: string }
                  count: { type: integer }
        "403": { description: caller is not the author, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
  /stories/{storyID}:
    delete:
      tags: [stories]
      summary: Delete the caller's own story
      parameters:
        - { name: storyID, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/OK" } } } }

  /ws:
    get:
      tags: [system]
      summary: WebSocket upgrade for realtime (authenticate via ?token=)
      description: |
        Upgrades to a WebSocket (HTTP 101). Authenticate with the session token as
        the `token` query parameter (browsers cannot set headers on WS).
        Frames are JSON envelopes `{ "t": <type>, "d": <payload> }`.
        Channel live delivery: `subscribe_channel`/`unsubscribe_channel` `{ chat_id }`
        opt a connection in/out of a channel's `channel:{id}` topic (O(1) post fan-out).
        See `docs/contracts.md` for the full frame protocol.
      security: []
      parameters:
        - { name: token, in: query, required: true, schema: { type: string } }
      responses:
        "101": { description: switching protocols (WebSocket) }
        "401": { description: missing/invalid token }

security:
  - bearerAuth: []
